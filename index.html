<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KitchenSync — set the time you want to eat and get a precise start schedule for every dish, with alarms to keep you on track.">
  <title>KitchenSync — Dinner, synchronised.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,600;9..144,0,700;9..144,0,800;9..144,1,600;9..144,1,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #FAF0E6;
      --surface:      #FFFCF8;
      --surface-2:    #F2E0CB;
      --border:       #C8855A;
      --border-soft:  #E8C9A8;
      --primary:      #B85C2A;
      --primary-dark: #8C4420;
      --text:         #2A1A08;
      --text-2:       #5C3A1A;
      --text-muted:   #8C6040;
      --white:        #FFFCF8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; width: 100%;
      background: rgba(250, 240, 230, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-soft);
      z-index: 100;
      padding: 0 2rem;
    }

    nav .inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    nav .logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    nav .logo-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    nav .links a {
      color: var(--text-2);
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    nav .links a:hover { color: var(--primary); }

    /* ── SHARED ──────────────────────────────────────── */
    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="inner">
      <a href="#" class="logo">
        <div class="logo-icon">⏱</div>
        KitchenSync
      </a>
      <div class="links">
        <a href="#features">Features</a>
        <a href="#how">How It Works</a>
        <a href="#get">Get It</a>
      </div>
    </div>
  </nav>

</body>
</html>
